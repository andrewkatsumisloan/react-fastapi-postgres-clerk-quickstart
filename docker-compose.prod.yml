x-server-environment: &server-environment
  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL for the production database}
  CLERK_JWT_ISSUER: ${CLERK_JWT_ISSUER:?Set CLERK_JWT_ISSUER for Clerk JWT validation}
  CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?Set CLERK_SECRET_KEY for user provisioning}
  CLERK_AUDIENCE: ${CLERK_AUDIENCE:-}
  CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-}

x-server-build: &server-build
  context: ./server
  dockerfile: Dockerfile.prod

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:?Set VITE_CLERK_PUBLISHABLE_KEY before building the production client}
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    image: fullstack-template-server:prod
    build: *server-build
    command: ["alembic", "upgrade", "head"]
    environment: *server-environment
    restart: "no"

  server:
    image: fullstack-template-server:prod
    build: *server-build
    expose:
      - "8000"
    environment: *server-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
